<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>✦ Curiosity - Vérification d'email</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <style>
      :root {
        --accent-purple: #7c5cbf;
        --accent-pink: #e879a0;
        --bg-base: #f0edf8;
        --bg-card: rgba(255, 255, 255, 0.72);
        --text-primary: #1a1630;
        --text-secondary: #6b5f8a;
        --gradient-accent: linear-gradient(135deg, #7c5cbf, #e879a0);
      }

      body.darkmode {
        --bg-base: #120f1e;
        --bg-card: rgba(30, 24, 50, 0.85);
        --text-primary: #f0ebff;
        --text-secondary: #b8a8e0;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 0;
        font-family: 'DM Sans', sans-serif;
        background: var(--bg-base);
        color: var(--text-primary);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 0.3s ease, color 0.3s ease;
      }

      /* Background texture */
      body::before {
        content: '';
        position: fixed;
        inset: 0;
        background:
          radial-gradient(ellipse 60% 40% at 20% 10%, rgba(124, 92, 191, 0.08) 0%, transparent 60%),
          radial-gradient(ellipse 50% 50% at 80% 80%, rgba(232, 121, 160, 0.06) 0%, transparent 60%),
          radial-gradient(ellipse 40% 60% at 60% 30%, rgba(79, 142, 247, 0.05) 0%, transparent 50%);
        pointer-events: none;
        z-index: 0;
      }

      .verify-container {
        position: relative;
        z-index: 1;
        max-width: 500px;
        width: 90%;
        padding: 20px;
      }

      .verify-card {
        background: var(--bg-card);
        backdrop-filter: blur(8px);
        border: 1px solid rgba(124, 92, 191, 0.12);
        border-radius: 24px;
        padding: 50px 40px;
        text-align: center;
        box-shadow: 0 20px 60px rgba(124, 92, 191, 0.16);
      }

      .verify-icon {
        font-size: 64px;
        margin-bottom: 20px;
        display: block;
      }

      .verify-card h1 {
        font-family: 'Sora', sans-serif;
        font-size: 28px;
        font-weight: 700;
        margin-bottom: 15px;
        color: var(--text-primary);
      }

      .verify-card p {
        font-size: 16px;
        color: var(--text-secondary);
        line-height: 1.7;
        margin-bottom: 30px;
      }

      .verify-btn {
        display: inline-block;
        background: var(--gradient-accent);
        color: white;
        padding: 12px 32px;
        border-radius: 999px;
        text-decoration: none;
        font-weight: 600;
        font-family: 'Sora', sans-serif;
        transition: transform 0.2s, box-shadow 0.2s;
        border: none;
        cursor: pointer;
        font-size: 15px;
      }

      .verify-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 12px 24px rgba(124, 92, 191, 0.25);
        color: white;
        text-decoration: none;
      }

      .verify-btn:active {
        transform: translateY(0);
      }

      .verify-subtitle {
        font-size: 13px;
        color: var(--text-secondary);
        margin-top: 20px;
        opacity: 0.8;
      }

      .logo {
        font-family: 'Sora', sans-serif;
        font-size: 18px;
        font-weight: 700;
        margin-bottom: 30px;
        color: var(--accent-purple);
      }
    </style>
  </head>
  <body>
    <div class="verify-container">
      <div class="verify-card">
        <div class="logo">✦ Curiosity</div>
        <span class="verify-icon">✅</span>
        <h1>Vérification réussie !</h1>
        <p>
          Votre adresse email a été vérifiée avec succès. 
          Vous pouvez maintenant vous connecter à votre compte.
        </p>
        <a href="#" id="continueLink" class="verify-btn" onclick="handleSubmit(event)">
          Continuer vers l'appli →
        </a>
        <div class="verify-subtitle">
          Redirection automatique en quelques secondes...
        </div>
      </div>
    </div>

    <script>
      function handleSubmit(e) {
        if (e) e.preventDefault();
        const continueLink = document.getElementById('continueLink');
        continueLink.href = 'http://localhost:5173/login';
        setTimeout(() => {
          window.location.href = continueLink.href;
        }, 2000);
      }
      
      window.addEventListener('load', () => {
        setTimeout(handleSubmit, 1000);
      });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
