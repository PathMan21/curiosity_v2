name: production

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Lint
        run: npm run format:check

      - name: Lint
        run: npm run format:fix

      - name: Run tests with coverage
        run: npm run test:ci -- --coverage --coverageThreshold='{"global":{"lines":70,"functions":70,"branches":70}}'

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30

      - name: Create Git tag
        if: success() && startsWith(github.event.head_commit.message, 'release:')
        run: |
          VERSION=$(echo "${{ github.event.head_commit.message }}" | grep -oP 'v\d+\.\d+\.\d+')
          git tag $VERSION
          git push origin $VERSION

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.USER_VPS }}
          key: ${{ secrets.SSH_KEY_VPS }}
          port: ${{ secrets.PORT_VPS }}
          script: |
            set -e

            cd /home/ubuntu/curiosity_v2

            git fetch origin
            git reset --hard origin/main

            # Redémarrage des services backend
            docker compose up -d --build backend mariadb redis

            # Construction du frontend
            cd frontend
            npm ci
            npm run build

            # Déploiement des fichiers statiques
            sudo mkdir -p /var/www/be-curious
            sudo rm -rf /var/www/be-curious/dist
            sudo cp -r dist /var/www/be-curious/

            # Vérification et rechargement de Nginx
            sudo nginx -t
            sudo systemctl reload nginx

            # Nettoyage
            docker image prune -f

      - name: Health check
        run: |
          sleep 10
          curl -f https://be-curious.fr/api/health
