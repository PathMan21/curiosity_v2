name: Deploy

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Check formatting
        run: npm run format:check

      - name: Run tests with coverage
        continue-on-error: true
        run: |
          npm run test:ci -- \
            --coverage \
            --coverageThreshold='{"global":{"lines":60,"functions":60,"branches":60}}'

      - name: Create Git tag
        if: startsWith(github.event.head_commit.message, 'release:')
        run: |
          VERSION=$(echo "${{ github.event.head_commit.message }}" | grep -oP 'v\d+\.\d+\.\d+')

          if [ -n "$VERSION" ]; then
            git config user.name "github-actions"
            git config user.email "github-actions@github.com"

            git tag "$VERSION"
            git push origin "$VERSION"
          fi

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.USER_VPS }}
          key: ${{ secrets.SSH_KEY_VPS }}
          port: ${{ secrets.PORT_VPS }}
          script: |
            set -e

            cd /home/ubuntu/curiosity_v2

            git fetch origin
            git reset --hard origin/main

            # Backend
            docker compose up -d --build backend mariadb redis

            # Frontend
            cd frontend
            npm ci
            npm run build

            sudo mkdir -p /var/www/be-curious
            sudo rm -rf /var/www/be-curious/dist
            sudo cp -r dist /var/www/be-curious/

            sudo nginx -t
            sudo systemctl reload nginx

            docker image prune -f

      - name: Health check
        run: |
          sleep 10
          curl -f https://be-curious.fr/api/health
