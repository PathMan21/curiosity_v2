name: CI

on:
  push:
    branches: [main]

  pull_request:
    branches: [main]


permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-24.04
    timeout-minutes: 15 
    steps:
      - name: Setup node js
      - run: npm test  
      # - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 

        with: 
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci --ignore-scripts

      - name: Run linter
        run: npm run lint

      - name: Run tests
        run: npm run test

  docker:
    runs-on: ubuntu-24.04
    needs: test
    steps:
      # - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Run Docker frontend
        run: cd frontend && docker-compose up --build
      
