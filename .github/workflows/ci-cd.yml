name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Lint
        run: npm run format:check

      - name: Lint
        run: npm run format:fix

      - name: Run tests with coverage
        run: npm run test:ci -- --coverage --coverageThreshold='{"global":{"lines":80,"functions":80,"branches":80}}'

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30

      - name: Create Git tag
        if: success() && startsWith(github.event.head_commit.message, 'release:')
        run: |
          VERSION=$(echo "${{ github.event.head_commit.message }}" | grep -oP 'v\d+\.\d+\.\d+')
          git tag $VERSION
          git push origin $VERSION

  deploy:
    runs-on: ubuntu-latest
    # needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.USER_VPS }}
          key: ${{ secrets.SSH_KEY_VPS }}
          port: ${{ secrets.PORT_VPS }}
          script: |
            cd /home/ubuntu/curiosity_v2

            git fetch origin
            git reset --hard origin/main

            docker compose down
            docker compose up -d --build

            docker image prune -f

      - name: Health check
        run: |
          echo "Waiting for app to start..."
          sleep 15
          curl -f --retry 5 --retry-delay 5 http://${{ secrets.VPS_IP }}/health || exit 1
