name: CI

on:
  push:
    branches: [main]

  pull_request:
    branches: [main]


permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-24.04
    timeout-minutes: 15 
    steps:
      - uses: actions/checkout@v4

      - name: Setup node js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: '20'
          cache: 'npm'
          

      - name: Install Dependencies
        run: npm ci --ignore-scripts

      # - name: Run tests
      #   run: npm run test

  docker:
    runs-on: ubuntu-24.04
    needs: test
    steps:
      - uses: actions/checkout@v4
        with:
          cache: 'npm'

      - name: Run Docker frontend
        run: cd frontend && docker compose up --build
      
