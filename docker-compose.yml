services:
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - '6379:6379'
    restart: unless-stopped
    volumes:
      - ./backend/redis:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lfu
    networks:
      - appnet

  mariadb:
    image: mariadb:10.11
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_PWD=root
      - MYSQL_DATABASE=db_curiosity
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - appnet
        
    ports:
        - "3306:3306"

  backend:
      build: ./backend
      environment:
        - DB_HOST=mariadb
        - REDIS_HOST=redis
        - 'MYSQL_ROOT_PASSWORD=root'
        - 'MYSQL_PWD=root'
      depends_on:
        mariadb:
          condition: service_healthy
        redis:
          condition: service_started
      ports:
        - '3000:3000'
      networks:
        - appnet
      develop:
        watch:
          - action: sync
            path: ./backend/src
            target: /app/src
          - action: rebuild
            path: ./backend/package.json

  frontend:
      build: ./frontend
      ports:
        - '5173:5173'
      environment:
        - VITE_DEV_SERVER=true
      depends_on:
        - backend
      networks:
        - appnet
      develop:
        watch:
          - action: sync
            path: ./frontend/src
            target: /app/src
          - action: rebuild
            path: ./frontend/package.json

volumes:
  db_data:

networks:
  appnet:
    driver: bridge
