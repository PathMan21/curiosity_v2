version: '3.9'

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lfu
    volumes:
      - ./backend/redis:/data
    networks:
      - appnet

  mariadb:
    image: mariadb:11
    restart: unless-stopped
    env_file:
      - .env.prod
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ['CMD', '/usr/local/bin/healthcheck.sh', '--innodb_initialized']
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - appnet

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - .env.prod
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - '127.0.0.1:3000:3000'
    networks:
      - appnet

volumes:
  db_data:

networks:
  appnet:
