services:
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "127.0.0.1:6379:6379"
    restart: unless-stopped
    volumes:
      - ./backend/redis:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lfu
    networks:
      - appnet

  mariadb:
    image: mariadb:10.11
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_PWD=root
      - MYSQL_DATABASE=db_curiosity
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - appnet

    ports:
      - "127.0.0.1:3307:3306"

  backend:
    build: ./backend
    environment:
      - DB_HOST=mariadb
      - REDIS_HOST=redis
      - "MYSQL_ROOT_PASSWORD=root"
      - "MYSQL_PWD=root"
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - appnet
    develop:
      watch:
        - action: sync
          path: ./backend/src
          target: /app/src
          ignore:
            - Helpers/cron.schedules.Photos.ts
            - Helpers/cron.schedules.Articles.ts
        - action: rebuild
          path: ./backend/package.json

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_DEV_SERVER=true
      - VITE_SERVER_URL=https://be-curious.fr
    depends_on:
      - backend
    networks:
      - appnet
    develop:
      watch:
        - action: sync
          path: ./frontend/src
          target: /app/src
        - action: rebuild
          path: ./frontend/package.json
          
